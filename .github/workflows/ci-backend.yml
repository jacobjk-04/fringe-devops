name: CI - Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Dependencies
        run: |
          cd backend
          go mod tidy

      - name: Build Backend
        run: |
          cd backend
          go build -o app

      - name: Run Tests
        run: |
          cd backend
          go test ./...